name: "CodeQL Analysis and Report"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  codeql:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      matrix:
        language: ["csharp"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Build project
        run: dotnet build --no-restore --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Install Python for report generation
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Export CodeQL alerts
        run: gh codeql alerts list --repo ${{ github.repository }} --json > codeql_alerts.json

      - name: Generate PO Report
        run: |
          python generate_report.py codeql_alerts.json po_report.html

      - name: Upload PO Report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: PO-Security-Report
          path: po_report.html
